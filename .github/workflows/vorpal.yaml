name: vorpal

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  cancel-in-progress: true
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}

jobs:
  build-dev:
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        runner:
          - macos-latest
          - macos-latest-large
          - ubuntu-latest
          - ubuntu-latest-arm64
    steps:
      - uses: actions/checkout@v7

      - uses: ALT-F4-LLC/setup-vorpal-action@0.1.1
        with:
          registry-backend: "s3"
          registry-backend-s3-bucket: "altf4llc-vorpal-registry"
          version: "0.2.2"
        env:
          AWS_ACCESS_KEY_ID: "${{ secrets.AWS_ACCESS_KEY_ID }}"
          AWS_DEFAULT_REGION: "${{ vars.AWS_DEFAULT_REGION }}"
          AWS_SECRET_ACCESS_KEY: "${{ secrets.AWS_SECRET_ACCESS_KEY }}"

      - run: vorpal build 'dev'

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ runner.arch }}-${{ runner.os }}-vorpal-lock
          path: Vorpal.lock

  build:
    needs:
      - build-dev
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        runner:
          - macos-latest
          - macos-latest-large
          - ubuntu-latest
          - ubuntu-latest-arm64
    steps:
      - uses: actions/checkout@v7

      - uses: ALT-F4-LLC/setup-vorpal-action@0.1.1
        with:
          registry-backend: "s3"
          registry-backend-s3-bucket: "altf4llc-vorpal-registry"
          version: "0.2.2"
        env:
          AWS_ACCESS_KEY_ID: "${{ secrets.AWS_ACCESS_KEY_ID }}"
          AWS_DEFAULT_REGION: "${{ vars.AWS_DEFAULT_REGION }}"
          AWS_SECRET_ACCESS_KEY: "${{ secrets.AWS_SECRET_ACCESS_KEY }}"

      - name: Build all artifacts
        run: |
          status=0

          while IFS= read -r artifact; do
            echo "::group::vorpal build $artifact"

            if ! vorpal build "$artifact"; then
              echo "::error::build failed for artifact: $artifact"
              status=1
            fi

            echo "::endgroup::"
          done < <(script/list-artifacts.sh)

          exit "$status"
