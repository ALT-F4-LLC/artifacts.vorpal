name: vorpal

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  cancel-in-progress: true
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}

jobs:
  build-dev:
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        runner:
          - macos-latest
          - macos-latest-large
          - ubuntu-latest
          - ubuntu-latest-arm64
    steps:
      - uses: actions/checkout@v6

      - uses: ALT-F4-LLC/setup-vorpal-action@0.1.1
        with:
          registry-backend: s3
          registry-backend-s3-bucket: altf4llc-vorpal-registry
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_DEFAULT_REGION: ${{ vars.AWS_DEFAULT_REGION }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - run: vorpal build 'dev'

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ runner.arch }}-${{ runner.os }}-vorpal-lock
          path: Vorpal.lock

  build:
    needs:
      - build-dev
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        artifact:
          - argocd
          - awscli2
          - bat
          - beads
          - bottom
          - cmake
          - crane
          - cue
          - direnv
          - doppler
          - eksctl
          - fd
          - ffmpeg
          - file
          - fluxcd
          - fzf
          - glow
          - golangci_lint
          - gpg
          - gum
          - helm
          - jj
          - jq
          - json_c
          - just
          - k9s
          - kind
          - kn
          - kubectl
          - kubeseal
          - lazygit
          - libassuan
          - libevent
          - libgcrypt
          - libgpg_error
          - libksba
          - libuv
          - libwebsockets
          - lima
          - mbedtls
          - ncurses
          - neovim
          - nginx
          - nnn
          - npth
          - openapi_generator_cli
          - openjdk
          - pkg_config
          - readline
          - ripgrep
          - sccache
          - sesh
          - skopeo
          - sqlite3
          - starship
          - talosctl
          - terraform
          - tmux
          - ttyd
          - umoci
          - uv
          - vhs
          - yq
          - zlib
          - zoxide
          - zsh
        runner:
          - macos-latest
          - macos-latest-large
          - ubuntu-latest
          - ubuntu-latest-arm64
    steps:
      - uses: actions/checkout@v6

      - uses: ALT-F4-LLC/setup-vorpal-action@0.1.1
        with:
          registry-backend: s3
          registry-backend-s3-bucket: altf4llc-vorpal-registry
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_DEFAULT_REGION: ${{ vars.AWS_DEFAULT_REGION }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - run: vorpal build '${{ matrix.artifact }}'
