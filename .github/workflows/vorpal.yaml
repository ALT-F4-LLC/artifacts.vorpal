name: vorpal

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  cancel-in-progress: true
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}

jobs:
  prepare:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        runner:
          - macos-latest
          - macos-latest-large
          - ubuntu-latest
          - ubuntu-latest-arm64
    steps:
      - uses: actions/checkout@v7

      - uses: ALT-F4-LLC/setup-vorpal-action@0.2.0
        with:
          registry-backend: "s3"
          registry-backend-s3-bucket: "altf4llc-vorpal-registry"
          version: "0.4.0"
        env:
          AWS_ACCESS_KEY_ID: "${{ secrets.AWS_ACCESS_KEY_ID }}"
          AWS_DEFAULT_REGION: "${{ vars.AWS_DEFAULT_REGION }}"
          AWS_SECRET_ACCESS_KEY: "${{ secrets.AWS_SECRET_ACCESS_KEY }}"

      - name: Prepare all artifacts
        id: prepare_lock
        run: |
          while IFS= read -r artifact; do
            echo "::group::vorpal prepare $artifact"
            vorpal prepare "$artifact"
            echo "::endgroup::"
          done < <(script/list-artifacts.sh)

          if git diff --quiet -- Vorpal.lock; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload prepared lockfile
        if: ${{ steps.prepare_lock.outputs.changed == 'true' }}
        uses: actions/upload-artifact@v7
        with:
          name: vorpal-lock-${{ env.ARCH }}-${{ env.OS }}
          path: Vorpal.lock

      - name: Fail on lockfile drift
        if: ${{ steps.prepare_lock.outputs.changed == 'true' }}
        run: |
          echo "::error file=Vorpal.lock::vorpal prepare changed Vorpal.lock. Download the vorpal-lock-${ARCH}-${OS} artifact, replace Vorpal.lock, commit it, and re-push."
          exit 1

  build:
    needs:
      - prepare
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        runner:
          - macos-latest
          - macos-latest-large
          - ubuntu-latest
          - ubuntu-latest-arm64
    steps:
      - uses: actions/checkout@v7

      - uses: ALT-F4-LLC/setup-vorpal-action@0.1.1
        with:
          registry-backend: "s3"
          registry-backend-s3-bucket: "altf4llc-vorpal-registry"
          version: "0.4.0"
        env:
          AWS_ACCESS_KEY_ID: "${{ secrets.AWS_ACCESS_KEY_ID }}"
          AWS_DEFAULT_REGION: "${{ vars.AWS_DEFAULT_REGION }}"
          AWS_SECRET_ACCESS_KEY: "${{ secrets.AWS_SECRET_ACCESS_KEY }}"

      - name: Build all artifacts
        run: |
          status=0
          failed_artifacts=()

          while IFS= read -r artifact; do
            echo "::group::vorpal build $artifact"

            if ! vorpal build "$artifact"; then
              echo "::error::build failed for artifact: $artifact"
              status=1
              failed_artifacts+=("$artifact")
            fi

            echo "::endgroup::"
          done < <(script/list-artifacts.sh)

          if [[ "$status" -ne 0 ]]; then
            echo "Failed artifacts: ${failed_artifacts[*]}"
            {
              echo "### Failed artifacts"
              printf -- '- %s\n' "${failed_artifacts[@]}"
            } >> "$GITHUB_STEP_SUMMARY"
          fi

          exit "$status"
