name: ci

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  cancel-in-progress: true
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}

jobs:
  build-dev:
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        runner:
          - macos-latest
          - macos-latest-large
          - ubuntu-latest
          - ubuntu-latest-arm64
    steps:
      - uses: actions/checkout@v6

      - uses: ALT-F4-LLC/setup-vorpal-action@0.1.1
        with:
          registry-backend: s3
          registry-backend-s3-bucket: altf4llc-vorpal-registry
          version: 0.2.2
        env:
          AWS_ACCESS_KEY_ID: "${{ secrets.AWS_ACCESS_KEY_ID }}"
          AWS_DEFAULT_REGION: "${{ vars.AWS_DEFAULT_REGION }}"
          AWS_SECRET_ACCESS_KEY: "${{ secrets.AWS_SECRET_ACCESS_KEY }}"

      - run: vorpal build 'dev'

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ runner.arch }}-${{ runner.os }}-vorpal-lock
          path: Vorpal.lock

  generate-matrix:
    runs-on: ubuntu-latest
    outputs:
      chunks: ${{ steps.generate.outputs.chunks }}
    steps:
      - uses: actions/checkout@v6

      - id: generate
        shell: bash
        run: |
          MAX_CHUNKS=50
          TARGET_CHUNK_SIZE=8

          ARTIFACTS="$(bash script/detect-changed-artifacts.sh --all)"
          N="$(jq 'length' <<< "$ARTIFACTS")"
          K=$(( (N + TARGET_CHUNK_SIZE - 1) / TARGET_CHUNK_SIZE ))
          if (( K < 1 )); then
            K=1
          fi
          if (( K > MAX_CHUNKS )); then
            K="$MAX_CHUNKS"
          fi

          if (( K * 4 > 256 )); then
            echo "chunk matrix would exceed GitHub Actions limit: $K * 4 > 256" >&2
            exit 1
          fi

          CHUNKS="$(jq -c --argjson k "$K" '[ to_entries | group_by(.key % $k)[] | map(.value) ]' <<< "$ARTIFACTS")"
          jq -e 'length > 0' <<< "$CHUNKS" >/dev/null
          echo "chunks=$CHUNKS" >> "$GITHUB_OUTPUT"

  build:
    needs:
      - build-dev
      - generate-matrix
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        chunk: ${{ fromJSON(needs.generate-matrix.outputs.chunks) }}
        runner:
          - macos-latest
          - macos-latest-large
          - ubuntu-latest
          - ubuntu-latest-arm64
    steps:
      - uses: actions/checkout@v6

      - uses: ALT-F4-LLC/setup-vorpal-action@0.1.1
        with:
          registry-backend: s3
          registry-backend-s3-bucket: altf4llc-vorpal-registry
          version: 0.2.2
        env:
          AWS_ACCESS_KEY_ID: "${{ secrets.AWS_ACCESS_KEY_ID }}"
          AWS_DEFAULT_REGION: "${{ vars.AWS_DEFAULT_REGION }}"
          AWS_SECRET_ACCESS_KEY: "${{ secrets.AWS_SECRET_ACCESS_KEY }}"

      - shell: bash
        run: |
          failed=()
          while IFS= read -r artifact; do
            if vorpal build "$artifact"; then
              echo "::notice::$artifact OK"
            else
              echo "::error::$artifact FAILED"
              failed+=("$artifact")
            fi
          done < <(echo '${{ toJSON(matrix.chunk) }}' | jq -r '.[]')

          if [ ${#failed[@]} -gt 0 ]; then
            echo "Failed artifacts in chunk: ${failed[*]}"
            exit 1
          fi
